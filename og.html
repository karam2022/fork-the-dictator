<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{
    background:radial-gradient(900px 600px at 78% -10%, #1a1422, #0b0d12 60%);
    color:#f4f1e8;
    font-family:"Space Grotesk",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
    display:flex; align-items:center; gap:24px; padding:64px 72px;
  }
  .left{flex:1; min-width:0;}
  .eyebrow{font-size:18px; letter-spacing:.32em; text-transform:uppercase; color:#9aa0ad; font-weight:700;}
  h1{font-size:108px; line-height:.96; font-weight:800; letter-spacing:-1px; margin:18px 0 0;}
  h1 .red{color:#e23b2e;} h1 .gold{color:#f5c542;}
  .tag{margin-top:26px; font-size:27px; line-height:1.32; color:#cdd2db; max-width:560px;}
  .tag b{color:#f4f1e8;}
  .pills{margin-top:30px; display:flex; gap:12px;}
  .pill{font-size:16px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:10px 16px; border-radius:99px;}
  .pill.mod{background:#0f3320; color:#37d67a;}
  .pill.play{background:#161b25; color:#f4f1e8; border:1px solid #2a3140;}
  .right{width:420px; display:flex; align-items:flex-end; justify-content:center; position:relative;}
  .right svg{filter:drop-shadow(0 26px 30px rgba(0,0,0,.6)); width:380px; height:auto;}
  .pow{position:absolute; font-weight:900; -webkit-text-stroke:4px #000; color:#f5c542; font-size:64px; transform:rotate(-12deg);
       top:8px; left:-6px; font-family:inherit;}
  .floor{position:absolute; bottom:-30px; left:50%; transform:translateX(-50%); width:360px; height:60px;
          background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent); border-radius:50%;}
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow">playground.dot · web3 summit</div>
    <h1><span class="red">FORK</span> THE<br/><span class="gold">DICTATOR</span></h1>
    <div class="tag">Punch the tyrant. Topple the regime. <b>Repeat.</b> A tiny browser game hosted on a <b>.dot</b> domain no tyrant can take down.</div>
    <div class="pills">
      <span class="pill mod">★ Moddable · fork me</span>
      <span class="pill play">👊 click · tap · mash</span>
    </div>
  </div>
  <div class="right">
    <div class="pow">POW!</div>
    <div class="floor"></div>
    <svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
      <g>
        <path d="M60 300 L60 180 Q120 150 180 180 L180 300 Z" fill="#3a4a3f"/>
        <path d="M60 300 L60 180 Q90 165 120 165 L120 300 Z" fill="#2a362e" opacity=".5"/>
        <path d="M70 168 L150 300 L176 300 L96 162 Z" fill="#e23b2e"/>
        <circle cx="92" cy="210" r="9" fill="#f5c542" stroke="#000" stroke-width="1.5"/>
        <circle cx="112" cy="222" r="7" fill="#dfe3ea" stroke="#000" stroke-width="1.5"/>
        <rect x="80" y="232" width="16" height="10" rx="2" fill="#f5c542" stroke="#000" stroke-width="1.5"/>
        <rect x="52" y="176" width="26" height="14" rx="4" fill="#f5c542" stroke="#000" stroke-width="1.5"/>
        <rect x="162" y="176" width="26" height="14" rx="4" fill="#f5c542" stroke="#000" stroke-width="1.5"/>
      </g>
      <g>
        <ellipse cx="120" cy="118" rx="58" ry="62" fill="#e8b98f" stroke="#000" stroke-width="2"/>
        <circle cx="62" cy="120" r="10" fill="#e8b98f" stroke="#000" stroke-width="2"/>
        <circle cx="178" cy="120" r="10" fill="#e8b98f" stroke="#000" stroke-width="2"/>
        <path d="M92 96 L112 104" stroke="#000" stroke-width="5" stroke-linecap="round"/>
        <path d="M148 96 L128 104" stroke="#000" stroke-width="5" stroke-linecap="round"/>
        <circle cx="102" cy="116" r="9" fill="#fff" stroke="#000" stroke-width="1.5"/>
        <circle cx="138" cy="116" r="9" fill="#fff" stroke="#000" stroke-width="1.5"/>
        <circle cx="102" cy="117" r="4" fill="#000"/>
        <circle cx="138" cy="117" r="4" fill="#000"/>
        <path d="M104 140 Q120 150 136 140 Q120 146 104 140 Z" fill="#3a2a1a" stroke="#000" stroke-width="1"/>
        <path d="M104 152 Q120 158 136 152" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g>
        <path d="M60 78 Q120 38 180 78 L180 86 Q120 70 60 86 Z" fill="#22281f" stroke="#000" stroke-width="2"/>
        <rect x="58" y="84" width="124" height="14" rx="4" fill="#1a1f17" stroke="#000" stroke-width="2"/>
        <rect x="58" y="92" width="124" height="6" fill="#f5c542"/>
        <circle cx="120" cy="64" r="11" fill="#f5c542" stroke="#000" stroke-width="2"/>
        <path d="M120 57 l2.5 5 5.5 .5 -4 4 1.2 5.5 -5.2 -3 -5.2 3 1.2 -5.5 -4 -4 5.5 -.5Z" fill="#1a1300"/>
      </g>
    </svg>
  </div>
</body>
</html>
